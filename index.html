<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>농담곰 콜렉션</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 모바일 햄버거 버튼 -->
    <button class="hamburger" id="hamburger" onclick="toggleSidebar()" aria-label="메뉴">
        <span></span><span></span><span></span>
    </button>

    <!-- 모바일 사이드바 -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-inner" id="sidebarContent"></div>
    </div>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <!-- 헤더 -->
    <header>
        <div class="header-inner">
            <h1 onclick="goHome()">농담곰 콜렉션</h1>
            <div id="navMenuContainer"></div>
        </div>
    </header>

    <!-- 본문 -->
    <main>
        <div id="listContainer">
            <div class="status-msg">
                <img src="img/loading.gif" alt="로딩중"><br>
                데이터 불러오는 중...
            </div>
        </div>

        <div id="previewContainer" style="display:none;">
            <div class="preview-card">
                <div class="preview-header">
                    <span class="preview-label">이미지 미리보기</span>
                    <button class="btn btn-primary btn-sm" onclick="downloadImage()">저장하기</button>
                </div>

                <div class="preview-options">
                    <div class="option-row">
                        <label class="option-item">
                            <input type="checkbox" id="optTitleCheck" checked>
                            <span>타이틀</span>
                        </label>
                        <input type="text" id="optTitleInput" value="농담곰 수집 리스트" class="title-input">
                    </div>
                    <div class="option-row">
                        <span class="option-label">상품명</span>
                        <label class="option-item">
                            <input type="checkbox" id="optNameKoCheck" checked>
                            <span>한글</span>
                        </label>
                        <label class="option-item">
                            <input type="checkbox" id="optNameJpCheck">
                            <span>日本語</span>
                        </label>
                        <label class="option-item">
                            <input type="checkbox" id="optPriceCheck">
                            <span>가격</span>
                        </label>
                    </div>
                </div>

                <div class="preview-img-box">
                    <img id="imgCollection" src="" alt="Collection Preview">
                </div>
            </div>

            <div class="preview-footer">
                <button class="btn btn-ghost" onclick="closePreview()">← 돌아가기</button>
            </div>
        </div>
    </main>

    <!-- 하단 수집률 바 -->
    <div class="floating-progress">
        <div class="progress-info">
            <span>수집률</span>
            <span id="progressText" class="progress-count">0/0 (0%)</span>
        </div>
        <div class="progress-track">
            <div class="progress-bar" id="progressBar"></div>
        </div>
    </div>

    <!-- 상단 이동 버튼 -->
    <div class="fab-container">
        <button class="fab" onclick="scrollToTop()" title="맨 위로">
            <img src="img/top.png" alt="Top" onerror="this.parentNode.innerHTML='↑'">
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
